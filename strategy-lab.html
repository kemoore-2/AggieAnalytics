<script>

<script>

  let canvas, ctx;
  let drawing = false;
  let currentColor = "#ffffff";
  let toolMode = "draw";

  /* ================= OPEN BOARD ================= */

  function openFullBoard(){

    document.querySelector(".max-w-6xl").style.display = "none";

    const board = document.createElement("div");
    board.id = "fullBoard";
    board.className = "fixed inset-0 bg-black z-50 flex flex-col";

    board.innerHTML = `
    <div class="flex justify-between items-center px-6 py-4 border-b border-gray-700">
      <h2 class="text-xl text-aggie-gold font-bold">Full Court Tactical Board</h2>
      <button onclick="closeFullBoard()" class="nav-pill">Exit</button>
    </div>

    <div class="flex-1 flex items-center justify-center relative">
      <canvas id="chalkboard"
              class="w-[95vw] h-[80vh] rounded-xl border-4 border-gray-600 shadow-2xl">
      </canvas>
    </div>

    <div class="flex justify-center gap-3 py-4 border-t border-gray-700 flex-wrap">

      <button onclick="setColor('#ffffff')" class="nav-pill">White</button>
      <button onclick="setColor('#ff2d2d')" class="nav-pill">Red</button>
      <button onclick="setTool('draw')" class="nav-pill">Draw</button>
      <button onclick="setTool('erase')" class="nav-pill">Erase</button>

      <button onclick="addPlayer('offense')" class="nav-pill">Add O</button>
      <button onclick="addPlayer('defense')" class="nav-pill">Add X</button>

      <select id="schemeSelect" class="nav-pill bg-black text-white border border-gray-600">
        <option>Pick & Roll</option>
        <option>Horns</option>
        <option>5-Out</option>
        <option>Zone 2-3</option>
        <option>ICE Coverage</option>
        <option>Switch Everything</option>
      </select>

      <button onclick="downloadBoard()" class="nav-pill">Download PNG</button>

    </div>
  `;

    document.body.appendChild(board);

    initializeClipboard();
  }

  /* ================= CLOSE ================= */

  function closeFullBoard(){
    document.getElementById("fullBoard").remove();
    document.querySelector(".max-w-6xl").style.display = "block";
  }

  /* ================= INIT ================= */

  function initializeClipboard(){
    canvas = document.getElementById("chalkboard");
    ctx = canvas.getContext("2d");

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    canvas.addEventListener("mousedown", startDraw);
    canvas.addEventListener("mouseup", stopDraw);
    canvas.addEventListener("mousemove", drawMove);
  }

  /* ================= RESIZE ================= */

  function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    drawCourt();
  }

  /* ================= DRAWING ================= */

  function startDraw(e){
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(getX(e), getY(e));
  }

  function stopDraw(){
    drawing = false;
    ctx.beginPath();
  }

  function drawMove(e){
    if(!drawing) return;

    ctx.lineWidth = toolMode === "erase" ? 18 : 3;
    ctx.strokeStyle = toolMode === "erase" ? "black" : currentColor;
    ctx.lineCap = "round";

    ctx.lineTo(getX(e), getY(e));
    ctx.stroke();
  }

  function getX(e){
    return e.clientX - canvas.getBoundingClientRect().left;
  }

  function getY(e){
    return e.clientY - canvas.getBoundingClientRect().top;
  }

  function setTool(tool){ toolMode = tool; }
  function setColor(color){ currentColor = color; }
  function clearBoard(){ drawCourt(); }

  /* ================= FULL COURT DRAW ================= */

  function drawCourt(){

    const w = canvas.width;
    const h = canvas.height;
    const margin = w * 0.03;

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,w,h);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;

    ctx.strokeRect(margin, margin, w-margin*2, h-margin*2);

    const midX = w/2;
    const midY = h/2;

    ctx.beginPath();
    ctx.moveTo(midX, margin);
    ctx.lineTo(midX, h-margin);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(midX, midY, h*0.08, 0, Math.PI*2);
    ctx.stroke();

    drawHalf(true);
    drawHalf(false);
  }

  function drawHalf(right){

    const w = canvas.width;
    const h = canvas.height;
    const margin = w*0.03;

    const hoopX = right ? w-margin-h*0.05 : margin+h*0.05;
    const hoopY = h/2;

    const keyW = h*0.18;
    const keyH = h*0.32;

    ctx.strokeRect(
      right ? w-margin-keyW : margin,
      hoopY-keyH/2,
      keyW,
      keyH
    );

    ctx.beginPath();
    ctx.arc(hoopX, hoopY, h*0.02, 0, Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(
      hoopX,
      hoopY,
      h*0.45,
      right ? Math.PI/2 : -Math.PI/2,
      right ? 3*Math.PI/2 : Math.PI/2
    );
    ctx.stroke();
  }

  /* ================= PLAYERS ================= */

  function addPlayer(type){

    const player = document.createElement("div");

    player.className = `
    absolute w-12 h-12 rounded-full
    flex items-center justify-center
    font-bold text-lg cursor-move select-none
    border border-gray-500
  `;

    player.style.background = type==="offense" ? "#ffffff" : "#ff2d2d";
    player.style.color = type==="offense" ? "black" : "white";
    player.innerText = type==="offense" ? "O" : "X";

    player.style.left = "50%";
    player.style.top = "50%";

    document.getElementById("fullBoard").appendChild(player);

    drag(player);
  }

  function drag(el){

    let offsetX, offsetY, dragging=false;

    el.addEventListener("mousedown", e=>{
      dragging=true;
      offsetX=e.offsetX;
      offsetY=e.offsetY;
    });

    document.addEventListener("mousemove", e=>{
      if(!dragging) return;
      el.style.left = (e.pageX-offsetX)+"px";
      el.style.top = (e.pageY-offsetY)+"px";
    });

    document.addEventListener("mouseup", ()=> dragging=false);
  }

  /* ================= DOWNLOAD ================= */

  function downloadBoard(){

    const link = document.createElement("a");
    link.download = "Aggie_Tactical_Board.png";
    link.href = canvas.toDataURL();
    link.click();
  }

</script>

      <button onclick="clearBoard()" class="nav-pill">Clear</button>
      <button onclick="addPlayer('offense')" class="nav-pill">Add O</button>
      <button onclick="addPlayer('defense')" class="nav-pill">Add X</button>
    </div>
  `;

    document.body.appendChild(board);

    initializeClipboard();
  }

  function closeFullBoard(){

    document.querySelector(".max-w-6xl").style.display = "block";

</script>
